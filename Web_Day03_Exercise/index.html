<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise Day 3</title>
    <!-- Import Roboto Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,500;0,700;1,700&display=swap"
        rel="stylesheet">

    <!-- Fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
        integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- CSS -->
    <link rel="stylesheet" href="./card.css">
</head>

<body>
    <div class="class-card">
        <!-- Năm, Ngày, Tháng -->
        <div class="class-time">
            <div class="class-year">
                2022
            </div>

            <div class="class-datetime">
                <div class="date">
                    14
                </div>

                <div class="month">
                    Tháng 6
                </div>
            </div>
        </div>

        <!-- Thông Tin Khóa Học -->
        <div class="class-info">
            <h2 class="class-title">
                <a href="https://java.techmaster.vn/" target="_blank">
                    Lộ trình đào tạo Java Spring Boot Fullstack (7 tháng)
                </a>
            </h2>
            <div class="class-details">
                <p><i class="fa-solid fa-calendar-days"></i> Thứ 3, 5, 7</p>

                <p><i class="fa-solid fa-clock"></i> 09:00 - 12:00</p>

                <p><i class="fa-solid fa-location-dot"></i> Cơ sở Nguyễn Đình Chiểu</p>
            </div>
        </div>

        <!-- Đăng Ký -->
        <div class="class-register">
            Đăng Ký
        </div>
    </div>
</body>

</html>
