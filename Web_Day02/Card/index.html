<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Project</title>
    <!-- Import google font Cách 2-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,500;0,700;1,700&display=swap" rel="stylesheet">

    <!-- Link fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Link css do mình tự viết đặt dưới thư viện -->
    <link rel="stylesheet" href="./card.css">
</head>

<body>
    <!-- div.card (class) hoặc div.#card(id) -->
    <div class="card">
        <!-- Chứa Ảnh, Ảnh luôn nằm trong div -->
        <div class="image">
            <img src="https://media.techmaster.vn/api/static/bub3enc51co7s932dsk0/6PyUoB-T" alt="AnhKhoaHoc1">
        </div>
        <!-- Nội Dung -->
        <div class="content">
            <h2 class="title">Lập trình Nodejs (cập nhật 2022)</h2>
            <p class="type">Trực Tuyến</p>
            <!-- Lấy Icon từ trang fontawesome -->
            <!-- Icon: bản chất Icon là text đặt trong thẻ Span -->
            <p class="vote">
                5 <span><i class="fa-solid fa-star"></i></span>
            </p>

        </div>
    </div>
</body>

</html>
