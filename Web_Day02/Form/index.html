<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form>
        <label>Nhập Tên</label>
        <input type="text" placeholder="Enter Name">

        <br>
        <label>Nhập Password</label>
        <input type="password" placeholder="Enter Password">

        <br>
        <textarea placeholder="Văn Bản"></textarea>

        <!-- Radio -->
        <br>
        <label>Giới Tính</label>
        <label for="Male">Nam</label>
        <input type="radio" name="giongnhau" id="Male">
        <br>
        <label for="Female">Nữ</label>
        <input type="radio" name="giongnhau" id="Female">

        <!-- Checkbox -->
        <br>
        <label>Ngôn Ngữ</label>
        <label for="Viet">Tiếng Việt</label>
        <input type="checkbox" name="language" id="Viet">
        <label>Tiếng Anh</label>
        <input type="checkbox" name="language" id="Anh">
        <label>Tiếng Nhật</label>
        <input type="checkbox" name="language" id="Nhat">
        <br>
        <!-- Select -->
        <select>
            <option value="">1990</option>
            <option value="">1991</option>
            <option value="">1992</option>
            <option value="">1993</option>
        </select>
        <br>
        <!-- Button -->
        <button>Đăng ký</button>
        <input type="submit" value="Đăng Nhập">
        <br>
        <!-- Choose File -->
        <input type="file">
        



    </form>
</body>

</html>
